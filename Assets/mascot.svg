<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="#1DB954" opacity="0.15"/>
  <circle cx="200" cy="200" r="170" fill="#1DB954" opacity="0.1"/>

  <!-- Body -->
  <ellipse cx="200" cy="260" rx="90" ry="100" fill="#2D2D2D"/>

  <!-- Head -->
  <circle cx="200" cy="155" r="85" fill="#3D3D3D"/>

  <!-- Eyes -->
  <ellipse cx="172" cy="148" rx="16" ry="18" fill="white"/>
  <ellipse cx="228" cy="148" rx="16" ry="18" fill="white"/>
  <circle cx="175" cy="150" r="9" fill="#1DB954"/>
  <circle cx="231" cy="150" r="9" fill="#1DB954"/>
  <circle cx="177" cy="147" r="3.5" fill="white"/>
  <circle cx="233" cy="147" r="3.5" fill="white"/>

  <!-- Happy mouth -->
  <path d="M 175 178 Q 200 200 225 178" stroke="#1DB954" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Blush -->
  <ellipse cx="152" cy="172" rx="14" ry="9" fill="#FF6B9D" opacity="0.4"/>
  <ellipse cx="248" cy="172" rx="14" ry="9" fill="#FF6B9D" opacity="0.4"/>

  <!-- Headphones band -->
  <path d="M 110 140 Q 110 65 200 60 Q 290 65 290 140" stroke="#1DB954" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- Left headphone -->
  <rect x="92" y="120" width="30" height="50" rx="12" fill="#1DB954"/>
  <rect x="96" y="126" width="22" height="38" rx="9" fill="#17A34A"/>

  <!-- Right headphone -->
  <rect x="278" y="120" width="30" height="50" rx="12" fill="#1DB954"/>
  <rect x="282" y="126" width="22" height="38" rx="9" fill="#17A34A"/>

  <!-- Music notes floating -->
  <g fill="#1DB954" opacity="0.8">
    <!-- Note 1 -->
    <circle cx="310" cy="80" r="8"/>
    <rect x="317" y="48" width="3" height="32"/>
    <path d="M 317 48 Q 330 42 330 55" stroke="#1DB954" stroke-width="3" fill="none"/>

    <!-- Note 2 -->
    <circle cx="85" cy="65" r="6"/>
    <rect x="90" y="38" width="2.5" height="27"/>
    <path d="M 90 38 Q 100 33 100 44" stroke="#1DB954" stroke-width="2.5" fill="none"/>

    <!-- Note 3 (double) -->
    <circle cx="330" cy="190" r="6"/>
    <circle cx="350" cy="185" r="6"/>
    <rect x="335" y="158" width="2.5" height="32"/>
    <rect x="355" y="153" width="2.5" height="32"/>
    <line x1="335" y1="158" x2="355" y2="153" stroke="#1DB954" stroke-width="3"/>
  </g>

  <!-- Lyrics text lines on body -->
  <rect x="155" y="235" width="90" height="5" rx="2.5" fill="#1DB954" opacity="0.7"/>
  <rect x="165" y="250" width="70" height="5" rx="2.5" fill="#1DB954" opacity="0.5"/>
  <rect x="158" y="265" width="84" height="5" rx="2.5" fill="#1DB954" opacity="0.3"/>

  <!-- Little arms -->
  <path d="M 115 250 Q 90 230 80 260" stroke="#2D2D2D" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M 285 250 Q 310 230 320 260" stroke="#2D2D2D" stroke-width="18" fill="none" stroke-linecap="round"/>

  <!-- Waving hand (right) -->
  <circle cx="322" cy="262" r="12" fill="#3D3D3D"/>
</svg>
